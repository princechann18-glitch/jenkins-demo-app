# ============================================================================
# Spring Boot Application Configuration
# ============================================================================
# This file contains the main configuration properties for the Jenkins Demo App
# Customize these properties to change application behavior without code changes

# Application Name and Version
spring.application.name=jenkins-demo-app
app.version=1.0-SNAPSHOT

# ============================================================================
# Server Configuration
# ============================================================================
# Tomcat server port
server.port=8080

# Server servlet context path
server.servlet.context-path=/

# Connection timeout (milliseconds)
server.tomcat.connection-timeout=20000

# ============================================================================
# Logging Configuration
# ============================================================================
# Root logging level
logging.level.root=INFO

# Application package logging level
logging.level.com.example.demo=DEBUG

# Spring Boot logging level
logging.level.org.springframework.boot=INFO
logging.level.org.springframework.web=INFO

# Log file configuration
logging.file.name=logs/application.log
logging.file.max-size=10MB
logging.file.max-history=10

# Log pattern
logging.pattern.console=%d{yyyy-MM-dd HH:mm:ss} - %msg%n
logging.pattern.file=%d{yyyy-MM-dd HH:mm:ss} [%thread] %-5level %logger{36} - %msg%n

# ============================================================================
# Spring MVC Configuration
# ============================================================================
# Enable detailed error messages
server.error.include-message=always
server.error.include-binding-errors=always
server.error.include-stacktrace=on_param
server.error.include-exception=false

# ============================================================================
# Management Endpoints (Actuator)
# ============================================================================
# Enable actuator endpoints for monitoring
management.endpoints.web.exposure.include=health,info,metrics
management.endpoint.health.show-details=always

# ============================================================================
# JaCoCo Code Coverage Configuration
# ============================================================================
# These properties help with test coverage reporting
sonar.coverage.jacoco.xmlReportPaths=target/site/jacoco/jacoco.xml
